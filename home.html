<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mariia Bakht | Acceso</title>
    <meta name="description"
        content="Inicia sesión o registrate para acceder al portafolio y servicios de Mariia Bakht, content creator.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,600;1,600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="login-page">
    <div class="login-bg">
        <img src="images/background.png" alt="Background" class="login-bg-img">
        <div class="login-bg-overlay"></div>
    </div>

    <main class="login-wrapper">
        <div class="login-card" id="login-card">

            <div class="login-brand">
                <h1 class="login-logo">Mariia Bakht</h1>
                <p class="login-tagline">Content Creator · Foto &amp; Video</p>
            </div>

            <div class="auth-tabs" role="tablist">
                <button class="auth-tab active" id="tab-login" role="tab" aria-selected="true"
                    aria-controls="panel-login">Iniciar sesión</button>
                <button class="auth-tab" id="tab-register" role="tab" aria-selected="false"
                    aria-controls="panel-register">Registrarse</button>
            </div>

            <div class="auth-panel active" id="panel-login" role="tabpanel" aria-labelledby="tab-login">
                <form class="login-form" id="login-form" novalidate>
                    <div class="login-input-group">
                        <label for="login-user">Email o usuario</label>
                        <div class="login-input-wrap">
                            <span class="login-icon">👤</span>
                            <input type="text" id="login-user" name="username"
                                placeholder="tu@email.com o usuario" autocomplete="username">
                        </div>
                    </div>
                    <div class="login-input-group">
                        <label for="login-pass">Contraseña</label>
                        <div class="login-input-wrap">
                            <span class="login-icon">🔒</span>
                            <input type="password" id="login-pass" name="password"
                                placeholder="Tu contraseña" autocomplete="current-password">
                            <button type="button" class="toggle-pass" id="toggle-login-pass"
                                aria-label="Mostrar u ocultar contraseña">👁</button>
                        </div>
                    </div>

                    <p class="auth-error" id="login-error" aria-live="polite"></p>

                    <button type="submit" class="btn-primary login-btn" id="login-submit-btn">Ingresar</button>

                    <p class="login-hint">
                        Demo: usuario <strong>mariia</strong> · contraseña <strong>bakht2026A!</strong>
                    </p>
                </form>
            </div>

            <div class="auth-panel" id="panel-register" role="tabpanel" aria-labelledby="tab-register">
                <form class="login-form" id="register-form" novalidate>

                    <div class="login-row-2">
                        <div class="login-input-group">
                            <label for="reg-nombre">Nombre</label>
                            <div class="login-input-wrap">
                                <span class="login-icon">🧑</span>
                                <input type="text" id="reg-nombre" name="nombre"
                                    placeholder="Nombre" autocomplete="given-name" required>
                            </div>
                        </div>
                        <div class="login-input-group">
                            <label for="reg-apellido">Apellido</label>
                            <div class="login-input-wrap">
                                <span class="login-icon">🧑</span>
                                <input type="text" id="reg-apellido" name="apellido"
                                    placeholder="Apellido" autocomplete="family-name" required>
                            </div>
                        </div>
                    </div>

                    <div class="login-input-group">
                        <label for="reg-email">Email</label>
                        <div class="login-input-wrap">
                            <span class="login-icon">📧</span>
                            <input type="email" id="reg-email" name="email"
                                placeholder="tu@email.com" autocomplete="email" required>
                        </div>
                    </div>

                    <div class="login-input-group">
                        <label for="reg-phone">Teléfono / WhatsApp</label>
                        <div class="login-input-wrap">
                            <span class="login-icon">📱</span>
                            <input type="tel" id="reg-phone" name="phone"
                                placeholder="+54 9 11 0000-0000" autocomplete="tel">
                        </div>
                    </div>

                    <div class="login-input-group">
                        <label for="reg-pass">Contraseña</label>
                        <div class="login-input-wrap">
                            <span class="login-icon">🔒</span>
                            <input type="password" id="reg-pass" name="password"
                                placeholder="Mínimo 8 caracteres" autocomplete="new-password" required>
                            <button type="button" class="toggle-pass" id="toggle-reg-pass"
                                aria-label="Mostrar u ocultar contraseña">👁</button>
                        </div>
                        <ul class="pass-requirements" id="pass-requirements">
                            <li class="req" id="req-length">
                                <span class="req-icon">○</span> Mínimo 8 caracteres
                            </li>
                            <li class="req" id="req-upper">
                                <span class="req-icon">○</span> Al menos 1 letra mayúscula
                            </li>
                            <li class="req" id="req-number">
                                <span class="req-icon">○</span> Al menos 1 número
                            </li>
                            <li class="req" id="req-symbol">
                                <span class="req-icon">○</span> Al menos 1 símbolo (!@#$%...)
                            </li>
                        </ul>
                    </div>

                    <div class="login-input-group">
                        <label for="reg-pass-confirm">Confirmar contraseña</label>
                        <div class="login-input-wrap">
                            <span class="login-icon">🔐</span>
                            <input type="password" id="reg-pass-confirm" name="password-confirm"
                                placeholder="Repetí tu contraseña" autocomplete="new-password" required>
                            <button type="button" class="toggle-pass" id="toggle-reg-pass-confirm"
                                aria-label="Mostrar u ocultar contraseña">👁</button>
                        </div>
                        <p class="pass-match-msg" id="pass-match-msg"></p>
                    </div>

                    <p class="auth-error" id="register-error" aria-live="polite"></p>
                    <p class="auth-success" id="register-success" aria-live="polite"></p>

                    <button type="submit" class="btn-primary login-btn" id="register-submit-btn">
                        Crear cuenta
                    </button>
                </form>
            </div>

        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
